services:
  nginx:
    depends_on:
      - auth-service
      - bus-service
      - payment-service
      - hotel-service
      - user-service
      - ride-service
      - driver-service
      - package-service
      - adventure-service
      - notification-service
      - admin-service
      - booking-service
    expose:
      - '80'
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://localhost/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nginx.rule=Host(`irtucumwj9akelon0k4iyatv.187.127.157.13.sslip.io`)"
      - traefik.http.services.nginx.loadbalancer.server.port=80
    build:
      context: .
      dockerfile: nginx.Dockerfile
  auth-service:
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USERNAME: niklo_auth
      DB_USER: niklo_auth
      DB_PASSWORD: niklo_auth_password
      DB_NAME: niklo_auth
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    depends_on:
      - postgres-db
      - redis
    expose:
      - '3001'
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:3001/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.auth-service.rule=Host(`szs601uiqefhc8jbpeq587f3.187.127.157.13.sslip.io`)"
