      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_USER: postgres
      DB_PASSWORD: niklo_postgres_password
      DB_NAME: postgres
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres-db
      - redis
    healthcheck:
      test:
