services:
  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    depends_on:
      - auth-service
      - bus-service
      - payment-service
      - hotel-service
      - user-service
      - ride-service
      - driver-service
      - package-service
      - adventure-service
      - notification-service
      - admin-service
      - booking-service
    expose:
      - '80'
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://localhost/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  auth-service:
    build:
      context: ./auth-service
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USERNAME: niklo_auth
      DB_USER: niklo_auth
      DB_PASSWORD: niklo_auth_password
      DB_NAME: niklo_auth
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    depends_on:
      - postgres-db
      - redis
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:PORT/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  bus-service:
    build:
      context: ./bus-service
    environment:
      NODE_ENV: development
      PORT: 3003
      DB_HOST: postgres-db
