services:
  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    depends_on:
      - auth-service
      - bus-service
      - payment-service
      - hotel-service
      - user-service
      - ride-service
      - driver-service
      - package-service
      - adventure-service
      - notification-service
      - admin-service
    expose:
      - "80"
    ports:
      - "80:80"

  auth-service:
    build:
      context: ./auth-service
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USERNAME: niklo_auth
      DB_PASSWORD: niklo_auth_password
      DB_NAME: niklo_auth
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    depends_on:
      - auth-db
      - redis

  bus-service:
    build:
      context: ./bus-service
    environment:
      NODE_ENV: production
      PORT: 3003
      DB_HOST: bus-db
      DB_PORT: 5432
      DB_USERNAME: niklo_bus
      DB_PASSWORD: niklo_bus_password
      DB_NAME: niklo_bus
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    depends_on:
      - bus-db

  payment-service:
    build:
      context: ./payment-service
    environment:
      NODE_ENV: production
      PORT: 3007
      DB_HOST: payment-db
      DB_PORT: 5432
      DB_USERNAME: niklo_payment
      DB_PASSWORD: niklo_payment_password
      DB_NAME: niklo_payment
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-replace-me}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-replace-me}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-replace-me}
    depends_on:
      - payment-db

  hotel-service:
    build:
      context: ./hotel-service
    environment:
      NODE_ENV: production
      PORT: 3004
      DB_HOST: hotel-db
      DB_PORT: 5432
      DB_USERNAME: niklo_hotel
      DB_PASSWORD: niklo_hotel_password
      DB_NAME: niklo_hotel
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    depends_on:
      - hotel-db

  user-service:
    build:
      context: ./user-service
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: user-db
      DB_PORT: 5432
      DB_USERNAME: niklo_user
      DB_PASSWORD: niklo_user_password
      DB_NAME: niklo_user
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    depends_on:
      - user-db

  ride-service:
    build:
      context: ./ride-service
    environment:
      NODE_ENV: production
      PORT: 3005
      DB_HOST: ride-db
      DB_PORT: 5432
      DB_USERNAME: niklo_ride
      DB_PASSWORD: niklo_ride_password
      DB_NAME: niklo_ride
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    depends_on:
      - ride-db

  driver-service:
    build:
      context: ./driver-service
    environment:
      NODE_ENV: production
      PORT: 3011
      DB_HOST: driver-db
      DB_PORT: 5432
      DB_USERNAME: niklo_driver
      DB_PASSWORD: niklo_driver_password
      DB_NAME: niklo_driver
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    depends_on:
      - driver-db

  package-service:
    build:
      context: ./package-service
    environment:
      NODE_ENV: production
      PORT: 3012
      DB_HOST: package-db
      DB_PORT: 5432
      DB_USERNAME: niklo_package
      DB_PASSWORD: niklo_package_password
      DB_NAME: niklo_package
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    depends_on:
      - package-db

  adventure-service:
    build:
      context: ./adventure-service
    environment:
      NODE_ENV: production
      PORT: 3013
      DB_HOST: adventure-db
      DB_PORT: 5432
      DB_USERNAME: niklo_adventure
      DB_PASSWORD: niklo_adventure_password
      DB_NAME: niklo_adventure
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    depends_on:
      - adventure-db

  notification-service:
    build:
      context: ./notification-service
    environment:
      NODE_ENV: production
      PORT: 3009
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}

  admin-service:
    build:
      context: ./admin-service
    environment:
      NODE_ENV: production
      PORT: 3020
      WORKSPACE_PATH: /workspace
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    volumes:
      - .:/workspace:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - auth-db
      - bus-db
      - payment-db
      - hotel-db
      - user-db
      - ride-db
      - driver-db
      - package-db
      - adventure-db
      - redis

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: niklo_auth
      POSTGRES_USER: niklo_auth
      POSTGRES_PASSWORD: niklo_auth_password
    volumes:
      - auth-db-data:/var/lib/postgresql/data

  bus-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: niklo_bus
      POSTGRES_USER: niklo_bus
      POSTGRES_PASSWORD: niklo_bus_password
    volumes:
      - bus-db-data:/var/lib/postgresql/data

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: niklo_payment
      POSTGRES_USER: niklo_payment
      POSTGRES_PASSWORD: niklo_payment_password
    volumes:
      - payment-db-data:/var/lib/postgresql/data

  hotel-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: niklo_hotel
      POSTGRES_USER: niklo_hotel
      POSTGRES_PASSWORD: niklo_hotel_password
    volumes:
      - hotel-db-data:/var/lib/postgresql/data

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: niklo_user
      POSTGRES_USER: niklo_user
      POSTGRES_PASSWORD: niklo_user_password
    volumes:
      - user-db-data:/var/lib/postgresql/data

  ride-db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: niklo_ride
      POSTGRES_USER: niklo_ride
      POSTGRES_PASSWORD: niklo_ride_password
    volumes:
      - ride-db-data:/var/lib/postgresql/data

  driver-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: niklo_driver
      POSTGRES_USER: niklo_driver
      POSTGRES_PASSWORD: niklo_driver_password
    volumes:
      - driver-db-data:/var/lib/postgresql/data

  package-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: niklo_package
      POSTGRES_USER: niklo_package
      POSTGRES_PASSWORD: niklo_package_password
    volumes:
      - package-db-data:/var/lib/postgresql/data

  adventure-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: niklo_adventure
      POSTGRES_USER: niklo_adventure
      POSTGRES_PASSWORD: niklo_adventure_password
    volumes:
      - adventure-db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

volumes:
  auth-db-data:
  bus-db-data:
  payment-db-data:
  hotel-db-data:
  user-db-data:
  ride-db-data:
  driver-db-data:
  package-db-data:
  adventure-db-data:
  redis-data:
