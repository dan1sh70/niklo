services:
  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    depends_on:
      - auth-service
      - bus-service
      - payment-service
      - hotel-service
      - user-service
      - ride-service
      - driver-service
      - package-service
      - adventure-service
      - notification-service
      - admin-service
      - booking-service
    expose:
      - "80"

  auth-service:
    build:
      context: ./auth-service
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USERNAME: niklo_auth
      DB_USER: niklo_auth
      DB_PASSWORD: niklo_auth_password
      DB_NAME: niklo_auth
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    depends_on:
      - postgres-db
      - redis

  bus-service:
    build:
      context: ./bus-service
    environment:
      NODE_ENV: production
      PORT: 3003
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USERNAME: niklo_bus
      DB_USER: niklo_bus
      DB_PASSWORD: niklo_bus_password
      DB_NAME: niklo_bus
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    depends_on:
      - postgres-db

  payment-service:
    build:
      context: ./payment-service
    environment:
      NODE_ENV: production
      PORT: 3007
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USERNAME: niklo_payment
      DB_USER: niklo_payment
      DB_PASSWORD: niklo_payment_password
      DB_NAME: niklo_payment
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-replace-me}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-replace-me}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-replace-me}
    depends_on:
      - postgres-db

  hotel-service:
    build:
      context: ./hotel-service
    environment:
      NODE_ENV: production
      PORT: 3004
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USERNAME: niklo_hotel
      DB_USER: niklo_hotel
      DB_PASSWORD: niklo_hotel_password
      DB_NAME: niklo_hotel
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    depends_on:
      - postgres-db

  user-service:
    build:
      context: ./user-service
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USERNAME: niklo_user
      DB_USER: niklo_user
      DB_PASSWORD: niklo_user_password
      DB_NAME: niklo_user
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    depends_on:
      - postgres-db

  ride-service:
    build:
      context: ./ride-service
    environment:
      NODE_ENV: production
      PORT: 3005
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USERNAME: niklo_ride
      DB_USER: niklo_ride
      DB_PASSWORD: niklo_ride_password
      DB_NAME: niklo_ride
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres-db
      - redis

  driver-service:
    build:
      context: ./driver-service
    environment:
      NODE_ENV: production
      PORT: 3011
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USERNAME: niklo_driver
      DB_USER: niklo_driver
      DB_PASSWORD: niklo_driver_password
      DB_NAME: niklo_driver
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    depends_on:
      - postgres-db

  package-service:
    build:
      context: ./package-service
    environment:
      NODE_ENV: production
      PORT: 3012
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USERNAME: niklo_package
      DB_USER: niklo_package
      DB_PASSWORD: niklo_package_password
      DB_NAME: niklo_package
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    depends_on:
      - postgres-db

  adventure-service:
    build:
      context: ./adventure-service
    environment:
      NODE_ENV: production
      PORT: 3013
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USERNAME: niklo_adventure
      DB_USER: niklo_adventure
      DB_PASSWORD: niklo_adventure_password
      DB_NAME: niklo_adventure
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    depends_on:
      - postgres-db

  notification-service:
    build:
      context: ./notification-service
    environment:
      NODE_ENV: production
      PORT: 3009
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USERNAME: niklo_notification
      DB_USER: niklo_notification
      DB_PASSWORD: niklo_notification_password
      DB_NAME: niklo_notification
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
    depends_on:
      - postgres-db

  admin-service:
    build:
      context: ./admin-service
    environment:
      NODE_ENV: production
      PORT: 3020
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres-db
      - redis

  booking-service:
    build:
      context: ./booking-service
    environment:
      NODE_ENV: production
      PORT: 3014
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USERNAME: niklo_booking
      DB_USER: niklo_booking
      DB_PASSWORD: niklo_booking_password
      DB_NAME: niklo_booking
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres-db
      - redis

  postgres-db:
    build:
      context: ./postgres-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: niklo_postgres_password
    volumes:
      - postgres-db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

volumes:
  postgres-db-data:
  redis-data:
